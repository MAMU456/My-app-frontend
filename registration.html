<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #fdfbfb, #ebedee); }
.form-container { width: 100%; max-width: 420px; padding: 40px; background: #ffffff; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); animation: fadeIn 0.6s ease-in-out; }
h2 { text-align: center; margin-bottom: 10px; font-size: 28px; color: #1a1a1a; }
.subtitle { text-align: center; font-size: 14px; color: #777; margin-bottom: 30px; }
label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
input { width: 100%; padding: 12px 14px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; transition: 0.3s ease; }
input:focus { border-color: #007BFF; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); outline: none; }
button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #007BFF; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s ease; }
button:hover { background: #0056b3; transform: translateY(-2px); }
.extra-links { text-align: center; margin-top: 20px; font-size: 13px; }
.extra-links a { color: #007BFF; text-decoration: none; font-weight: 500; }
.extra-links a:hover { text-decoration: underline; }
.error-msg { color: red; font-size: 13px; text-align: center; margin-bottom: 10px; display: none; }
.success-msg { color: green; font-size: 13px; text-align: center; margin-bottom: 10px; display: none; }
@keyframes fadeIn { from {opacity: 0; transform: translateY(15px);} to {opacity: 1; transform: translateY(0);} }
</style>
</head>
<body>

<script>
const API = https://my-app-backend-qb9r.onrender.com
async function registerUser(event) {
  event.preventDefault();

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirm_password").value;
  const errorMsg = document.getElementById("error-msg");
  const successMsg = document.getElementById("success-msg");

  errorMsg.style.display = "none";
  successMsg.style.display = "none";

  if (password !== confirmPassword) {
    errorMsg.textContent = "Passwords do not match";
    errorMsg.style.display = "block";
    return;
  }

  try {
    const response = await fetch(`${API}/auth/register`,  {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    const data = await response.json();

    if (response.ok) {
      successMsg.textContent = "Account created! Redirecting to login...";
      successMsg.style.display = "block";
      setTimeout(() => window.location.href = "login.html", 2000);
    } else {
      errorMsg.textContent = data.detail || "Registration failed";
      errorMsg.style.display = "block";
    }
  } catch (err) {
    errorMsg.textContent = "Could not connect to server. Is the backend running?";
    errorMsg.style.display = "block";
  }
}
</script>

<div class="form-container">
  <form onsubmit="registerUser(event)">
    <h2>Create Account</h2>
    <div class="subtitle">Register to start shopping with us</div>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <label>Username</label>
    <input type="text" id="username" required>

    <label>Email Address</label>
    <input type="email" id="email" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <label>Confirm Password</label>
    <input type="password" id="confirm_password" required>

    <button type="submit">Register</button>

    <div class="extra-links">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </form>
</div>

</body>
</html>
