<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendors | Distribution System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

:root{
  --primary:#2563eb;
  --accent:#22c55e;
  --secondary:#1e293b;
  --light:#f8fafc;
  --card-bg:rgba(255,255,255,0.07);
  --card-border:rgba(255,255,255,0.1);
  --text-muted:#94a3b8;
}

body{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  color:#f1f5f9;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
}

/* NAVBAR */
nav{
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.5);
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

nav h2{
  color:var(--accent);
  font-family:'Syne',sans-serif;
  font-size:20px;
  letter-spacing:-0.5px;
}

nav a{
  color:#cbd5e1;
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
  font-weight:500;
  transition:color 0.2s;
}

nav a:hover{ color:var(--accent); }
nav a.active{ color:var(--accent); }

.nav-user{
  color:var(--text-muted);
  font-size:13px;
  margin-right:15px;
}

/* PAGE HEADER */
.page-header{
  padding:60px 40px 30px;
  text-align:center;
  animation:fadeDown 0.6s ease;
}

.page-header h1{
  font-family:'Syne',sans-serif;
  font-size:42px;
  font-weight:800;
  background:linear-gradient(135deg,#fff,#94a3b8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

.page-header p{
  color:var(--text-muted);
  font-size:15px;
}

/* SEARCH & FILTER BAR */
.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding:0 40px 40px;
  flex-wrap:wrap;
  animation:fadeUp 0.6s ease 0.1s both;
}

.search-wrap{
  position:relative;
}

.search-wrap input{
  padding:13px 20px 13px 44px;
  width:320px;
  border-radius:50px;
  border:1px solid var(--card-border);
  background:rgba(255,255,255,0.06);
  color:#f1f5f9;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:0.3s;
}

.search-wrap input::placeholder{ color:var(--text-muted); }
.search-wrap input:focus{
  border-color:var(--primary);
  background:rgba(37,99,235,0.08);
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

.search-wrap .icon{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  font-size:16px;
}

.filter-btns{
  display:flex;
  gap:8px;
}

.filter-btn{
  padding:11px 20px;
  border-radius:50px;
  border:1px solid var(--card-border);
  background:rgba(255,255,255,0.05);
  color:#cbd5e1;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:0.2s;
  font-weight:500;
}

.filter-btn:hover,
.filter-btn.active{
  background:var(--primary);
  border-color:var(--primary);
  color:white;
}

/* STATS BAR */
.stats-bar{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:0 40px 35px;
  animation:fadeUp 0.6s ease 0.2s both;
}

.stat{
  text-align:center;
}

.stat-num{
  font-family:'Syne',sans-serif;
  font-size:28px;
  font-weight:800;
  color:var(--accent);
}

.stat-label{
  font-size:12px;
  color:var(--text-muted);
  margin-top:2px;
}

/* VENDOR GRID */
.vendors-section{
  padding:0 40px 60px;
}

.vendor-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:24px;
}

/* VENDOR CARD */
.vendor-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:20px;
  padding:28px;
  transition:transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
  animation:fadeUp 0.5s ease both;
  position:relative;
  overflow:hidden;
}

.vendor-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg,var(--primary),var(--accent));
  opacity:0;
  transition:opacity 0.3s;
}

.vendor-card:hover{
  transform:translateY(-6px);
  box-shadow:0 25px 50px rgba(0,0,0,0.4);
  border-color:rgba(37,99,235,0.4);
}

.vendor-card:hover::before{ opacity:1; }

.vendor-card.hidden{ display:none; }

/* CARD TOP */
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}

.vendor-avatar{
  width:52px;
  height:52px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--primary),#1d4ed8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne',sans-serif;
  font-size:20px;
  font-weight:800;
  color:white;
  flex-shrink:0;
}

.vendor-status{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:600;
  padding:5px 12px;
  border-radius:50px;
}

.vendor-status.open{
  background:rgba(34,197,94,0.15);
  color:#22c55e;
  border:1px solid rgba(34,197,94,0.3);
}

.vendor-status.closed{
  background:rgba(239,68,68,0.12);
  color:#f87171;
  border:1px solid rgba(239,68,68,0.25);
}

.status-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:currentColor;
  animation:pulse 2s infinite;
}

.vendor-status.closed .status-dot{ animation:none; }

/* CARD BODY */
.vendor-name{
  font-family:'Syne',sans-serif;
  font-size:19px;
  font-weight:700;
  color:#f1f5f9;
  margin-bottom:4px;
}

.vendor-location{
  color:var(--text-muted);
  font-size:13px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:5px;
}

.stars{
  color:#facc15;
  font-size:15px;
  letter-spacing:2px;
  margin-bottom:4px;
}

.rating-text{
  font-size:12px;
  color:var(--text-muted);
  margin-bottom:16px;
}

/* INFO ROWS */
.info-rows{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:20px;
  padding:14px;
  background:rgba(0,0,0,0.2);
  border-radius:12px;
}

.info-row{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:#cbd5e1;
}

.info-row .label{
  color:var(--text-muted);
  font-size:12px;
  min-width:60px;
}

/* CARD ACTIONS */
.card-actions{
  display:flex;
  gap:10px;
}

.btn-select{
  flex:1;
  padding:11px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--primary),#1d4ed8);
  color:white;
  font-size:13px;
  font-weight:600;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:0.3s;
}

.btn-select:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(37,99,235,0.4);
}

.btn-select.selected{
  background:linear-gradient(135deg,var(--accent),#16a34a);
  box-shadow:0 8px 20px rgba(34,197,94,0.3);
}

.btn-contact{
  padding:11px 16px;
  border:1px solid var(--card-border);
  border-radius:12px;
  background:transparent;
  color:#cbd5e1;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:0.3s;
}

.btn-contact:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.2);
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  z-index:200;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-overlay.open{ display:flex; }

.modal{
  background:#1e293b;
  border:1px solid var(--card-border);
  border-radius:24px;
  padding:36px;
  max-width:480px;
  width:100%;
  animation:scaleIn 0.3s ease;
  position:relative;
}

.modal-close{
  position:absolute;
  top:18px; right:18px;
  background:rgba(255,255,255,0.08);
  border:none;
  color:#94a3b8;
  width:32px; height:32px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}

.modal-close:hover{ background:rgba(255,255,255,0.15); color:white; }

.modal h3{
  font-family:'Syne',sans-serif;
  font-size:22px;
  color:#f1f5f9;
  margin-bottom:20px;
}

.modal-info{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:24px;
}

.modal-row{
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px 16px;
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  font-size:14px;
  color:#cbd5e1;
}

.modal-row .icon{ font-size:18px; }
.modal-row strong{ color:#f1f5f9; display:block; font-size:12px; margin-bottom:2px; }

.modal-actions{
  display:flex;
  gap:12px;
}

.modal .btn-select{ flex:1; padding:13px; font-size:14px; border-radius:14px; }
.modal .btn-contact{ padding:13px 20px; border-radius:14px; }

/* EMPTY STATE */
.empty-state{
  text-align:center;
  padding:80px 20px;
  color:var(--text-muted);
  display:none;
}

.empty-state .icon{ font-size:48px; margin-bottom:16px; }
.empty-state p{ font-size:15px; }

/* TOAST */
.toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#22c55e;
  color:white;
  padding:14px 22px;
  border-radius:14px;
  font-size:14px;
  font-weight:600;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 10px 30px rgba(34,197,94,0.4);
  transform:translateY(80px);
  opacity:0;
  transition:0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index:999;
}

.toast.show{ transform:translateY(0); opacity:1; }

/* FOOTER */
footer{
  background:#0f172a;
  color:#475569;
  text-align:center;
  padding:25px;
  font-size:13px;
  border-top:1px solid rgba(255,255,255,0.05);
}

/* ANIMATIONS */
@keyframes fadeDown{
  from{ opacity:0; transform:translateY(-20px); }
  to{ opacity:1; transform:translateY(0); }
}

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

@keyframes scaleIn{
  from{ opacity:0; transform:scale(0.92); }
  to{ opacity:1; transform:scale(1); }
}

@keyframes pulse{
  0%,100%{ opacity:1; }
  50%{ opacity:0.4; }
}

.btn-shop{
  background:rgba(34,197,94,0.15) !important;
  color:#22c55e !important;
  border:1px solid rgba(34,197,94,0.3) !important;
}
.btn-shop:hover{
  background:rgba(34,197,94,0.25) !important;
}

@media(max-width:768px){
  nav{ padding:15px 20px; }
  .page-header{ padding:40px 20px 20px; }
  .page-header h1{ font-size:30px; }
  .controls{ padding:0 20px 30px; }
  .search-wrap input{ width:100%; }
  .vendors-section{ padding:0 20px 40px; }
  .stats-bar{ gap:20px; padding:0 20px 30px; }
}
</style>
</head>
<body>

<!-- Auth check -->
<script>
  const token = localStorage.getItem("token");
  const username = localStorage.getItem("username");
  if (!token) window.location.href = "first.html";
</script>

<!-- NAVBAR -->
<nav>
  <h2>Distribution System</h2>
  <div>
    <span class="nav-user">User: <span id="nav-username"></span></span>
    <a href="dashboard.html">Home</a>
    <a href="vendors.html" class="active">Vendors</a>
    <a href="products.html">Products</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>Our Vendors</h1>
  <p>Find and connect with trusted suppliers across Kenya</p>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="total-count">6</div>
    <div class="stat-label">Total Vendors</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="open-count">4</div>
    <div class="stat-label">Open Now</div>
  </div>
  <div class="stat">
    <div class="stat-num">6</div>
    <div class="stat-label">Cities Covered</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search vendors..." oninput="filterVendors()">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" onclick="filterByStatus('all', this)">All</button>
    <button class="filter-btn" onclick="filterByStatus('open', this)">Open Now</button>
    <button class="filter-btn" onclick="filterByStatus('closed', this)">Closed</button>
  </div>
</div>

<!-- VENDOR GRID -->
<div class="vendors-section">
  <div class="vendor-grid" id="vendor-grid"></div>
  <div class="empty-state" id="empty-state">
    <div class="icon">🔍</div>
    <p>No vendors match your search.</p>
  </div>
</div>

<footer>© 2026 Distribution System | Contact: info@company.com | +254 700 000 000</footer>

<!-- VENDOR DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modal-name"></h3>
    <div class="modal-info" id="modal-info"></div>
    <div class="modal-actions">
      <button class="btn-select" id="modal-select-btn" onclick="selectVendorFromModal()">✓ Select Vendor</button>
      <button class="btn-contact" id="modal-contact-btn" onclick="contactVendorFromModal()">Call</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
document.getElementById("nav-username").textContent = username || "User";

let allVendors = [];
let selectedVendorId = localStorage.getItem("selectedVendorId");
let currentModalVendor = null;
let currentFilter = "all";

function starsHTML(rating){
  const full = Math.round(rating);
  return "★".repeat(full) + "☆".repeat(5 - full);
}

async function loadVendors(){
  try {
    const res = await fetch("http://localhost:8000/vendors/");
    allVendors = await res.json();
    renderVendors(allVendors);
  } catch(err) {
    document.getElementById("vendor-grid").innerHTML = "<p style='color:#f87171;text-align:center;padding:40px'>Could not load vendors. Is the backend running?</p>";
  }
}

function renderVendors(list){
  const grid = document.getElementById("vendor-grid");
  const empty = document.getElementById("empty-state");

  if(list.length === 0){
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";
  grid.innerHTML = list.map((v, i) => `
    <div class="vendor-card" id="card-${v.id}" data-status="${v.status}" style="animation-delay:${i * 0.07}s">
      <div class="card-top">
        <div class="vendor-avatar">${v.initials}</div>
        <div class="vendor-status ${v.status}">
          <span class="status-dot"></span>
          ${v.status === "open" ? "Open Now" : "Closed"}
        </div>
      </div>

      <div class="vendor-name">${v.name}</div>
      <div class="vendor-location">${v.location}</div>
      <div class="stars">${starsHTML(v.rating)}</div>
      <div class="rating-text">${v.rating} stars</div>

      <div class="info-rows">
        <div class="info-row"><span class="label">Hours</span> ${v.hours}</div>
        <div class="info-row"><span class="label">Phone</span> ${v.phone}</div>
        <div class="info-row"><span class="label">Email</span> ${v.email}</div>
      </div>

      <div class="card-actions">
        <button class="btn-select ${selectedVendorId == v.id ? 'selected' : ''}"
          id="select-btn-${v.id}"
          onclick="selectVendor(${v.id})">
          ${selectedVendorId == v.id ? '✓ Selected' : 'Select Vendor'}
        </button>
        <button class="btn-contact" onclick="openModal(${v.id})">Details</button>
        <button class="btn-contact btn-shop" onclick="shopWithVendor(${v.id}, '${escapeQ(v.name)}', '${escapeQ(v.initials)}', '${escapeQ(v.location)}')">Shop</button>
      </div>
    </div>
  `).join("");

  document.getElementById("total-count").textContent = allVendors.length;
  document.getElementById("open-count").textContent = allVendors.filter(v => v.status === "open").length;
}

function filterVendors(){
  const query = document.getElementById("searchInput").value.toLowerCase();
  let filtered = allVendors.filter(v =>
    v.name.toLowerCase().includes(query) ||
    v.location.toLowerCase().includes(query)
  );
  if(currentFilter !== "all"){
    filtered = filtered.filter(v => v.status === currentFilter);
  }
  renderVendors(filtered);
}

function filterByStatus(status, btn){
  currentFilter = status;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterVendors();
}

function selectVendor(id){
  selectedVendorId = id;
  localStorage.setItem("selectedVendorId", id);

  document.querySelectorAll(".btn-select").forEach(btn => {
    btn.classList.remove("selected");
    btn.textContent = "Select Vendor";
  });

  const btn = document.getElementById(`select-btn-${id}`);
  if(btn){ btn.classList.add("selected"); btn.textContent = "✓ Selected"; }

  const vendor = allVendors.find(v => v.id === id);
  showToast(`✓ ${vendor.name} selected!`);
}

function openModal(id){
  const v = allVendors.find(v => v.id === id);
  currentModalVendor = v;

  document.getElementById("modal-name").textContent = v.name;
  document.getElementById("modal-info").innerHTML = `
    <div class="modal-row"><div><strong>Location</strong>${v.location}</div></div>
    <div class="modal-row"><div><strong>Available Hours</strong>${v.hours}</div></div>
    <div class="modal-row"><div><strong>Rating</strong>${starsHTML(v.rating)} (${v.rating} stars)</div></div>
    <div class="modal-row"><div><strong>Phone</strong>${v.phone}</div></div>
    <div class="modal-row"><div><strong>Email</strong>${v.email}</div></div>
    <div class="modal-row"><div><strong>Status</strong>${v.status === "open" ? "Open Now" : "Currently Closed"}</div></div>
  `;

  const selectBtn = document.getElementById("modal-select-btn");
  if(selectedVendorId == v.id){
    selectBtn.textContent = "✓ Already Selected";
    selectBtn.classList.add("selected");
  } else {
    selectBtn.textContent = "✓ Select Vendor";
    selectBtn.classList.remove("selected");
  }

  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  currentModalVendor = null;
}

function closeModalOutside(e){
  if(e.target === document.getElementById("modal-overlay")) closeModal();
}

function selectVendorFromModal(){
  if(currentModalVendor){ selectVendor(currentModalVendor.id); closeModal(); }
}

function contactVendorFromModal(){
  if(currentModalVendor) contactVendor(currentModalVendor.phone, currentModalVendor.name);
}

function contactVendor(phone, name){
  showToast(`Calling ${name}...`);
  setTimeout(() => window.location.href = `tel:${phone}`, 800);
}

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

function shopWithVendor(id, name, initials, location) {
  selectVendor(id);
  const params = new URLSearchParams({ vendor_id: id, vendor_name: name, vendor_initials: initials, vendor_location: location });
  window.location.href = `checkout.html?${params.toString()}`;
}

function escapeQ(str){ return String(str).replace(/'/g, "\\'"); }

function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("username");
  localStorage.removeItem("selectedVendorId");
  window.location.href = "index.html";
}

loadVendors();
</script>
</body>
</html>
