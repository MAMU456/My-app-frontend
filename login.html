<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Distribution System</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #fdfbfb, #ebedee); }
.form-container { width: 100%; max-width: 420px; padding: 40px; background: #ffffff; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); animation: fadeIn 0.6s ease-in-out; }
h2 { text-align: center; margin-bottom: 10px; font-size: 28px; color: #1a1a1a; }
.subtitle { text-align: center; font-size: 14px; color: #777; margin-bottom: 30px; }
label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
input { width: 100%; padding: 12px 14px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; transition: 0.3s ease; }
input:focus { border-color: #007BFF; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); outline: none; }
button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #007BFF; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s ease; }
button:hover { background: #0056b3; transform: translateY(-2px); }
button:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }
.extra-links { text-align: center; margin-top: 20px; font-size: 13px; }
.extra-links a { color: #007BFF; text-decoration: none; font-weight: 500; }
.extra-links a:hover { text-decoration: underline; }
.error-msg { color: red; font-size: 13px; text-align: center; margin-bottom: 10px; display: none; padding: 10px; background: #fff0f0; border-radius: 8px; }
@keyframes fadeIn { from {opacity: 0; transform: translateY(15px);} to {opacity: 1; transform: translateY(0);} }
</style>
</head>
<body>

<div class="form-container">
  <form onsubmit="loginUser(event)">
    <h2>Welcome Back</h2>
    <div class="subtitle">Login to continue shopping</div>

    <div class="error-msg" id="error-msg"></div>

    <label>Username</label>
    <input type="text" id="username" required autocomplete="username">

    <label>Password</label>
    <input type="password" id="password" required autocomplete="current-password">

    <button type="submit" id="submit-btn">Login</button>

    <div class="extra-links">
      Don't have an account? <a href="registration.html">Register</a>
    </div>
  </form>
</div>

<script>
async function loginUser(event) {
  event.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("error-msg");
  const submitBtn = document.getElementById("submit-btn");

  // Hide previous errors
  errorMsg.style.display = "none";

  // Disable button while loading
  submitBtn.disabled = true;
  submitBtn.textContent = "Logging in...";

  try {
    const response = await fetch("http://localhost:8000/auth/login", {
  method: "POST",
  headers: {
    "Content-Type": "application/x-www-form-urlencoded"
  },
  body: "username=" + encodeURIComponent(username) + "&password=" + encodeURIComponent(password)
});

    const data = await response.json();

    if (response.ok) {
      // Save token and username
      localStorage.setItem("token", data.access_token);
      localStorage.setItem("username", username);
      window.location.href = "index.html";
    } else {
      // Handle error message from backend
      if (typeof data.detail === "string") {
        errorMsg.textContent = data.detail;
      } else if (Array.isArray(data.detail)) {
        errorMsg.textContent = data.detail.map(e => e.msg).join(", ");
      } else {
        errorMsg.textContent = "Login failed. Please try again.";
      }
      errorMsg.style.display = "block";
    }

  } catch (err) {
    errorMsg.textContent = "Could not connect to server. Is the backend running?";
    errorMsg.style.display = "block";
  } finally {
    // Re-enable button
    submitBtn.disabled = false;
    submitBtn.textContent = "Login";
  }
}
</script>

</body>
</html>
